name: Build ARM64 JNI Stub

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Create stub source
        run: |
          cat > jni_stub.c << 'EOFCODE'
          #include <jni.h>
          #include <android/log.h>

          #define TAG "TRAJ_STUB"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, TAG, __VA_ARGS__)

          // gstv.aB.a(Class, int)V - string decryptor no-op
          JNIEXPORT void JNICALL Java_gstv_aB_a__Ljava_lang_Class_2I(JNIEnv *env, jclass clazz, jclass target, jint key) {
              (void)env; (void)clazz; (void)target; (void)key;
          }

          // gstv.K.a()Z - returns true
          JNIEXPORT jboolean JNICALL Java_gstv_K_a__(JNIEnv *env, jclass clazz) {
              (void)env; (void)clazz;
              return JNI_TRUE;
          }

          // gstv.K.d(gstv.ag)V - no-op
          JNIEXPORT void JNICALL Java_gstv_K_d__Lgstv_ag_2(JNIEnv *env, jclass clazz, jobject ag) {
              (void)env; (void)clazz; (void)ag;
              LOGI("K.d(ag) called - no-op");
          }

          // gstv.ag.a(Context, Intent)V - no-op
          JNIEXPORT void JNICALL Java_gstv_ag_a__Landroid_content_Context_2Landroid_content_Intent_2(JNIEnv *env, jobject thiz, jobject ctx, jobject intent) {
              (void)env; (void)thiz; (void)ctx; (void)intent;
          }

          JNIEXPORT jint JNICALL JNI_OnLoad(JavaVM *vm, void *reserved) {
              (void)vm; (void)reserved;
              LOGI("JNI stub v3 loaded (JNIEXPORT mode)");
              return JNI_VERSION_1_6;
          }
          EOFCODE

      - name: Compile ARM64 shared library
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          
          $CC -shared -o libtale_blackwhale.so \
            -fPIC -O2 -Wall \
            jni_stub.c \
            -llog
          
          file libtale_blackwhale.so
          ls -la libtale_blackwhale.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64-jni-stub
          path: libtale_blackwhale.so

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-stub-v${{ github.run_number }}
          name: "ARM64 JNI Stub v${{ github.run_number }}"
          files: libtale_blackwhale.so
          body: "ARM64 JNI stub for libtale_blackwhale.so replacement"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
