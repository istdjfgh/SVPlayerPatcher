name: Build memdump binary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Compile memdump for x86_64 (static)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          CC=$TOOLCHAIN/bin/x86_64-linux-android21-clang

          $CC -static -O2 -Wall -o memdump memdump.c
          file memdump
          ls -la memdump

          $CC -static -O2 -Wall -o memscan memscan.c -lm
          file memscan
          ls -la memscan

      - name: Upload memdump artifact
        uses: actions/upload-artifact@v4
        with:
          name: memdump
          path: memdump

      - name: Upload memscan artifact
        uses: actions/upload-artifact@v4
        with:
          name: memscan
          path: memscan
